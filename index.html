<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>duhui.org</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00e676;
    --bg: #0e0e0e;
    --surface: #151515;
    --border: #1e1e1e;
    --text: #ffffff;
    --muted: #555555;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  nav {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .logo {
    font-size: 17px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .logo span { color: var(--green); }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 24px;
  }

  h1 {
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 16px;
  }

  h1 span { color: var(--green); }

  p {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.8;
    max-width: 320px;
  }

  footer {
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 11px;
    color: #2a2a2a;
  }
</style>
</head>
<body>
  <nav>
    <div class="logo">du<span>hui</span>.org</div>
  </nav>

  <main>
    <h1>Welcome to <span>duhui</span></h1>
    <p>A simple place for tools and downloads. Nothing fancy, just what you need.</p>
  </main>

  <footer>duhui.org © 2026</footer>
</body>
</html>
